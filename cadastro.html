<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta charset="UTF-8">

<body>

<header>

<nav>
        
         <!-- navegação do site -->

</nav>

</header>

<main class="container">

        <h1>Crie sua conta</h1>

<form action="index.html" method="post" autocomplete="off">

<div class="input-box">
         
         <input type="email" id="email" required placeholder="Digite seu email">
         <i class="bx bx-envelope"></i><br><br>
</div>

<div class="input-box">
         
         <input type="password" id="senha" required placeholder="Crie sua senha" minlength="8" maxlength="12" size="12"> 
         <i class="bx bx-lock"></i><br><br>

</div>

<div class="input-box">
         
         <input type="password" id="confirmesuasenha" required placeholder="Confirme sua senha" minlength="8" maxlength="12" size="12"> 
         <i class="bx bx-lock"></i><br><br>

</div>

<div>
        
         <button type="submit">Criar conta</button><br><br>

</div>

<div class="login">

         <p>Já tem uma conta? <a href="login.html">Faça login</a></p>

</div>

</form>

</main>

</footer>
