<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa de mensagem </title>
     <link rel="icon" href="imagens/logo.jpeg">
    <style>
        body {
            padding: 20px;
            background-image: url('imagens/fundoagracimento.jpeg');
            background-size: cover;
            background-position: center;
        }

        h2 {
            text-align: center;
            padding-inline-start: 0%;
            font-family: Arial, Helvetica, sans-serif;
            color:  rgb(20, 155, 155);

        }

        h3 {
            text-align: center;
            padding-inline-start: 0%;
            font-family: Arial, Helvetica, sans-serif;
            color: rgb(20, 155, 155);

        }

        .img_agradecimento {
            border: 3px solid black;
            border-radius: 15px;
            display: block;
            margin: auto;
            box-shadow: 0px 5px 15px rgba(0, 0, 0.3);

        }

        nav {
            text-align: center;
            font-size: 16px;
            font-family: Arial, Helvetica, sans-serif;
        }

        nav a {

            padding: 10px 20px;
            border: none;
            background-color: black;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;

        }

        nav a:hover {
            color: cadetblue;
            text-decoration: none;
        }

        footer {
            text-align: center;
            font-family: Arial, Helvetica, sans-serif;
                color: antiquewhite;
        }

        main {
            height: 20vh;
        }
     
.container {
    text-align: center;
    color: #edc54d;
  font-family: "Bebas Neue", sans-serif;
  font-size: 20px;
  letter-spacing: 2px;
    text-shadow: 1px 10px 0px #000000;
    background-size: 100% 100%;
    background-repeat: no-repeat;
    background-position: center;
    object-fit: cover;
    /* A imagem corta as laterais mas mantém a proporção */
    object-position: center;
    /* Mantém o centro da imagem sempre visível */
    display: block;
}

#ft-perfil {
    border-radius: 80%;
margin: 10px;
    width: 30%;
border: 2px solid gold;
box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
}

.lateral {
    background-color:#1A1A1A;
    position: fixed;
    height: 100vh;
    width: 250px;
    left: -274px;
    z-index: 1000;
    transition: 0.5s;
    border-radius: 3px;
    text-align: center;
    color: rgb(104, 51, 165);
    border: solid, 1px gold;
    font-family: Verdana, Geneva, Tahoma, sans-serif;
    font-size: 20px;
    padding-top: 60px;
}

.lateral p  {
    font-size: x-small;
    margin: 10px;
   
}

.lateral h3{
    color: gold;
    text-shadow: none;
}
.lateral ul {
    list-style: none;
    padding: 0;

}

.lateral a {
    text-decoration: none;
    background-color: transparent;
    color: #BFBFBF;
    font-size: 15px;
    padding: 5px;
    border-radius: 5px;
    display: block;
    transition: 0.3s;
}

.lateral a:hover {
    color: gold;
  background-color: rgb(255, 255, 255,0.05);
    transition: all, 0.5s;
    padding: 15px;
}

.lateral.active {
    left: 0%;
    
}

.menu-butao {
    position: absolute;
    left: 10px;
    top: 10px;
    background: none;
    border: none;
    font-size: 30px;
    cursor: pointer;
    color: aliceblue;
}

.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(5px);
    z-index: 9;
    opacity: 0;
    pointer-events: none;
    transition: 0.3s
}

.overlay.active {
    opacity: 1;
    pointer-events: auto;
    transition: 0.5s;
}
       

    </style>
</head>

<body>
  <div class="overlay" id="overlay"></div>

    <nav class="lateral" id="lateral">
        <img id="ft-perfil" src="imagens/perfil.jpg" alt="perfil">
        <p><a href="login.html">login</a></p>
        <hr>
        <h3>Labirinto Literario</h3>
        <ul>
            
              <li><a href="index.html">Inicio</a></li><br>

            <li><a href="#">Produtos</a></li><br>

            <li><a href="contatos.html">Contatos</a></li><br>

            <li><a href="sobre.html">Sobre</a></li><br>

              <li><a href="novidades.html">Novidades</a></li><br>
        </ul>

        </div>

    </nav>

    <nav class="container">
        <h1> LABIRINTO LITERARIO </h1>
        <button id="menu-butao" class="menu-butao">☰</button>
        
    </nav>
    <img src="imagens/img_agradecimento.jpg" alt="Foto de img_agradecimento " width="250" height="250"
        class="img_agradecimento">
    <h2> Seus dados foram enviados corretamente</h2>
    <h3>Agradeço pelo feedback</h3>
    <nav>
        <a href="contatos.html" title="clique aqui!">Voltar</a>
    </nav>
    <main></main>
    <footer>
        <p>&copy; 2026 - Labirinto literário. Todos os direitos reservados.</p>
    </footer>
    <script>
        document.getElementById('menu-butao').addEventListener('click', function () {
    const lateral = document.getElementById('lateral');
    const overlay = document.getElementById('overlay'); 

    lateral.classList.toggle('active');
    overlay.classList.toggle('active'); // Ativa/desativa o blur junto com a barra

   
    if (lateral.classList.contains('active')) {
        this.textContent = '☰';
    } else {                          //ABRE E FECHA O MENU
        this.textContent = '☰';
    }
});

//  Fecha o menu se clicar no desfoque (fora da barra)
document.getElementById('overlay').addEventListener('click', function () {
    const lateral = document.getElementById('lateral');
    const btn = document.getElementById('menu-butao');
    
    lateral.classList.remove('active');
    this.classList.remove('active');
    btn.textContent = '☰';
});
    </script>
</body>

</html>
